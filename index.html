<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffalo Trace Barcode Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F5F0E6;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #1B4D3E;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .divider {
            width: 60px;
            height: 2px;
            background: #C4A35A;
            margin: 0 auto 12px;
        }
        
        .header .subtitle {
            font-size: 0.85rem;
            color: #5a5a5a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .container {
            background: #FFFFFF;
            border-radius: 4px;
            box-shadow: 0 4px 24px rgba(27, 77, 62, 0.08);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #e0ddd5;
        }
        
        .section-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1B4D3E;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        
        .section-desc {
            font-size: 0.8rem;
            color: #777;
            margin-bottom: 16px;
        }
        
        .status {
            padding: 12px 16px;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .status.loading {
            background: #FFF8E6;
            color: #8B6914;
            border: 1px solid #F0E4C3;
        }
        
        .status.ready {
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
        }
        
        textarea {
            width: 100%;
            height: 140px;
            padding: 14px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            border: 1px solid #d0cdc5;
            border-radius: 3px;
            background: #FAFAF8;
            color: #1a1a1a;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #1B4D3E;
            box-shadow: 0 0 0 3px rgba(27, 77, 62, 0.1);
        }
        
        textarea::placeholder {
            color: #aaa;
        }
        
        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 14px 28px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn.primary {
            background: #1B4D3E;
            color: #FFFFFF;
        }
        
        .btn.primary:hover:not(:disabled) {
            background: #153d31;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(27, 77, 62, 0.25);
        }
        
        .btn.secondary {
            background: transparent;
            color: #1B4D3E;
            border: 2px solid #1B4D3E;
        }
        
        .btn.secondary:hover:not(:disabled) {
            background: #1B4D3E;
            color: #FFFFFF;
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .preview-section {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #e8e5dd;
        }
        
        .preview-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1B4D3E;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }
        
        #preview {
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        
        #preview p {
            color: #aaa;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
        }
        
        .size-selector {
            background: #F5F0E6;
            border-radius: 3px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border-left: 3px solid #C4A35A;
        }

        .size-selector-title {
            font-size: 0.65rem;
            font-weight: 600;
            color: #1B4D3E;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .size-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .size-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #1a1a1a;
            cursor: pointer;
        }

        .size-option input[type="radio"] {
            accent-color: #1B4D3E;
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0;
        }

        .specs {
            background: #F5F0E6;
            border-radius: 3px;
            padding: 16px 20px;
            margin-top: 24px;
            border-left: 3px solid #C4A35A;
        }
        
        .specs-title {
            font-size: 0.65rem;
            font-weight: 600;
            color: #1B4D3E;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        
        .specs p {
            font-size: 0.75rem;
            color: #666;
            line-height: 1.7;
        }
        
        .footer {
            margin-top: 40px;
            text-align: center;
            opacity: 0.7;
        }
        
        .footer svg {
            height: 24px;
            width: auto;
        }

        .upload-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e8e5dd;
        }
        
        .upload-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1B4D3E;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .upload-area {
            border: 2px dashed #d0cdc5;
            border-radius: 4px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #FAFAF8;
        }
        
        .upload-area:hover {
            border-color: #1B4D3E;
            background: #f5f3ef;
        }
        
        .upload-area.dragover {
            border-color: #1B4D3E;
            background: #e8f5e9;
        }
        
        .upload-icon {
            font-size: 2rem;
            color: #1B4D3E;
            margin-bottom: 8px;
        }
        
        .upload-text {
            font-size: 0.85rem;
            color: #666;
        }
        
        .upload-text span {
            color: #1B4D3E;
            font-weight: 600;
        }
        
        .upload-hint {
            font-size: 0.75rem;
            color: #999;
            margin-top: 8px;
        }
        
        #fileInput {
            display: none;
        }
        
        .ocr-status {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 3px;
            font-size: 0.8rem;
            display: none;
        }
        
        .ocr-status.processing {
            display: block;
            background: #FFF8E6;
            color: #8B6914;
            border: 1px solid #F0E4C3;
        }
        
        .ocr-status.success {
            display: block;
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #C8E6C9;
        }
        
        .ocr-status.error {
            display: block;
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #FFCDD2;
        }
        
        .or-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0ddd5;
        }
        
        .or-divider::before {
            margin-right: 16px;
        }
        
        .or-divider::after {
            margin-left: 16px;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 150px;
            margin-top: 12px;
            border-radius: 4px;
            border: 1px solid #e0ddd5;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Buffalo Trace</h1>
        <div class="divider"></div>
        <p class="subtitle">Barcode Generator</p>
    </div>
    
    <div class="container">
        <div id="fontStatus" class="status loading">Loading Gotham Medium font...</div>

        <div class="size-selector">
            <div class="size-selector-title">Hang Tag Size</div>
            <div class="size-options">
                <label class="size-option">
                    <input type="radio" name="barcodeSize" value="3" onchange="onSizeChange()" checked>
                    3x3 large apparel hang tags
                </label>
                <label class="size-option">
                    <input type="radio" name="barcodeSize" value="2" onchange="onSizeChange()">
                    2x2 small hat/accessory hang tags
                </label>
            </div>
        </div>

        <div class="upload-section">
            <label class="upload-label">Upload Screenshot</label>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📷</div>
                <div class="upload-text"><span>Click to upload</span> or drag and drop</div>
                <div class="upload-hint">PNG, JPG, or screenshot with barcode numbers</div>
                <input type="file" id="fileInput" accept="image/*">
                <img id="previewImage" class="preview-image" style="display:none;">
            </div>
            <div id="ocrStatus" class="ocr-status"></div>
        </div>
        
        <div class="or-divider">or type manually</div>
        
        <h2 class="section-title">Enter Barcode Numbers</h2>
        <p class="section-desc">Enter 8-digit barcode numbers, one per line</p>
        
        <textarea id="codes" placeholder="62334404
88891716
97717520"></textarea>
        
        <div class="button-row">
            <button onclick="generateBarcodes()" id="genBtn" class="btn primary" disabled>Generate Barcodes</button>
            <button onclick="clearAll()" class="btn secondary">Clear</button>
        </div>
        
        <div class="preview-section">
            <h3 class="preview-title">Preview</h3>
            <div id="preview"><p>Enter codes and click "Generate Barcodes"</p></div>
            
            <div class="button-row" style="justify-content: center;">
                <button onclick="downloadPDF()" id="downloadBtn" class="btn primary" disabled>Download PDF</button>
            </div>
        </div>
        
    </div>

        const CODE128_PATTERNS = [

        ];

        // SCALE = 1 → 3" x 3" barcode size (original)
        // SCALE = 2/3 → 2" x 2" barcode size (66.67% of original)
        let SCALE = 1;
        let BARCODE_WIDTH, BARCODE_HEIGHT, CLEAR_SPACE, FONT_SIZE, HORIZONTAL_SPACING, CAP_HEIGHT;

        function updateBarcodeDimensions() {
            BARCODE_WIDTH = 1.5147 * 72 * SCALE;
            BARCODE_HEIGHT = 0.5 * 72 * SCALE;
            CLEAR_SPACE = 0.07 * 72 * SCALE;
            FONT_SIZE = 7.5474 * SCALE;
            HORIZONTAL_SPACING = 2.02 * 72 * SCALE;
            CAP_HEIGHT = FONT_SIZE * 0.7;
        }
        updateBarcodeDimensions();

        function onSizeChange() {
            const selected = document.querySelector('input[name="barcodeSize"]:checked').value;
            SCALE = selected === '3' ? 1 : 2 / 3;
            updateBarcodeDimensions();
            // Refresh preview if barcodes have already been generated
            if (generatedCodes.length > 0) {
                generateBarcodes();
            }
        }

        let loadedFont = null;
        let generatedCodes = [];

        async function loadFont() {
            try {
                const fontBytes = Uint8Array.from(atob(FONT_BASE64), c => c.charCodeAt(0));
                loadedFont = opentype.parse(fontBytes.buffer);
                document.getElementById('fontStatus').textContent = '✓ Gotham Medium font loaded';
                document.getElementById('fontStatus').style.display = 'none';
                document.getElementById('genBtn').disabled = false;
            } catch (e) {
                document.getElementById('fontStatus').textContent = '⚠ Error: ' + e.message;
                document.getElementById('fontStatus').style.background = '#f8d7da';
                document.getElementById('fontStatus').style.color = '#721c24';
            }
        }
        loadFont();

        function charToCode128AValue(char) {
            const ascii = char.charCodeAt(0);
            if (ascii >= 32 && ascii <= 95) return ascii - 32;
            if (ascii >= 0 && ascii <= 31) return ascii + 64;
            throw new Error("Invalid char: " + char);
        }

        function encodeCode128A(data) {
            const values = [103];
            for (let i = 0; i < data.length; i++) values.push(charToCode128AValue(data[i]));
            let checksum = values[0];
            for (let i = 1; i < values.length; i++) checksum += values[i] * i;
            values.push(checksum % 103);
            values.push(106);
            return values;
        }

        function calculateTotalModules(data) {
            const values = encodeCode128A(data);
            let total = 0;
            for (let i = 0; i < values.length; i++) {
                const pattern = CODE128_PATTERNS[values[i]];
                for (let j = 0; j < pattern.length; j++) total += parseInt(pattern[j]);
            }
            return total;
        }

        function createBarcodeSVG(data) {
            const values = encodeCode128A(data);
            const totalModules = calculateTotalModules(data);
            const moduleWidth = BARCODE_WIDTH / totalModules;
            let bars = "";
            let x = 0;
            for (let i = 0; i < values.length; i++) {
                const pattern = CODE128_PATTERNS[values[i]];
                let isBar = true;
                for (let j = 0; j < pattern.length; j++) {
                    const width = parseInt(pattern[j]) * moduleWidth;
                    if (isBar) bars += '<rect x="' + x + '" y="0" width="' + width + '" height="' + BARCODE_HEIGHT + '" fill="black"/>';
                    x += width;
                    isBar = !isBar;
                }
            }
            return '<svg width="' + BARCODE_WIDTH + '" height="' + BARCODE_HEIGHT + '" viewBox="0 0 ' + BARCODE_WIDTH + ' ' + BARCODE_HEIGHT + '">' + bars + '</svg>';
        }

        function generateBarcodes() {
            const codesText = document.getElementById('codes').value.trim();
            if (!codesText) { alert('Please enter at least one barcode number'); return; }
            generatedCodes = codesText.split('\n').map(function(c) { return c.trim(); }).filter(function(c) { return c.length > 0; });
            const container = document.createElement('div');
            container.className = 'barcode-row';
            for (let i = 0; i < generatedCodes.length; i++) {
                const code = generatedCodes[i];
                const group = document.createElement('div');
                group.className = 'barcode-group';
                group.innerHTML = createBarcodeSVG(code);
                const text = document.createElement('div');
                text.className = 'barcode-text';
                text.textContent = '*' + code + '*';
                group.appendChild(text);
                container.appendChild(group);
            }
            document.getElementById('preview').innerHTML = '';
            document.getElementById('preview').appendChild(container);
            document.getElementById('downloadBtn').disabled = false;
        }

        function clearAll() {
            document.getElementById('codes').value = '';
            document.getElementById('preview').innerHTML = '<p style="color: #999; text-align: center;">Enter codes and click "Generate Barcodes"</p>';
            document.getElementById('downloadBtn').disabled = true;
            generatedCodes = [];
        }

        // Convert opentype.js path to PDF path commands
        function pathToPDFCommands(path, offsetX, offsetY) {
            let cmds = '';
            for (let i = 0; i < path.commands.length; i++) {
                const cmd = path.commands[i];
                if (cmd.type === 'M') {
                    cmds += (offsetX + cmd.x).toFixed(4) + ' ' + (offsetY - cmd.y).toFixed(4) + ' m\n';
                } else if (cmd.type === 'L') {
                    cmds += (offsetX + cmd.x).toFixed(4) + ' ' + (offsetY - cmd.y).toFixed(4) + ' l\n';
                } else if (cmd.type === 'C') {
                    cmds += (offsetX + cmd.x1).toFixed(4) + ' ' + (offsetY - cmd.y1).toFixed(4) + ' ' +
                            (offsetX + cmd.x2).toFixed(4) + ' ' + (offsetY - cmd.y2).toFixed(4) + ' ' +
                            (offsetX + cmd.x).toFixed(4) + ' ' + (offsetY - cmd.y).toFixed(4) + ' c\n';
                } else if (cmd.type === 'Q') {
                    // Convert quadratic to cubic bezier
                    const prev = path.commands[i-1];
                    const x0 = prev ? prev.x : 0;
                    const y0 = prev ? prev.y : 0;
                    const x1 = x0 + 2/3 * (cmd.x1 - x0);
                    const y1 = y0 + 2/3 * (cmd.y1 - y0);
                    const x2 = cmd.x + 2/3 * (cmd.x1 - cmd.x);
                    const y2 = cmd.y + 2/3 * (cmd.y1 - cmd.y);
                    cmds += (offsetX + x1).toFixed(4) + ' ' + (offsetY - y1).toFixed(4) + ' ' +
                            (offsetX + x2).toFixed(4) + ' ' + (offsetY - y2).toFixed(4) + ' ' +
                            (offsetX + cmd.x).toFixed(4) + ' ' + (offsetY - cmd.y).toFixed(4) + ' c\n';
                } else if (cmd.type === 'Z') {
                    cmds += 'h\n';
                }
            }
            return cmds;
        }

        function getTextWidth(text) {
            const path = loadedFont.getPath(text, 0, 0, FONT_SIZE);
            const bbox = path.getBoundingBox();
            return bbox.x2 - bbox.x1;
        }

        function downloadPDF() {
            try {
                if (generatedCodes.length === 0 || !loadedFont) { alert('Please generate barcodes first'); return; }

                const numBarcodes = generatedCodes.length;
                const totalWidth = (numBarcodes * BARCODE_WIDTH) + ((numBarcodes - 1) * HORIZONTAL_SPACING);
                const margin = 0.5 * 72;
                const pageWidth = totalWidth + (2 * margin);
                const pageHeight = 2 * 72;

                let objects = [];
                objects.push('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj');
                objects.push('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj');
                objects.push('3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + pageWidth.toFixed(2) + ' ' + pageHeight.toFixed(2) + '] /Contents 4 0 R /Resources << >> >>\nendobj');

                let content = '';
                for (let i = 0; i < generatedCodes.length; i++) {
                    const code = generatedCodes[i];
                    const xOffset = margin + (i * (BARCODE_WIDTH + HORIZONTAL_SPACING));
                    const barcodeTop = pageHeight - margin;
                    const barcodeBottom = barcodeTop - BARCODE_HEIGHT;
                    const textTop = barcodeBottom - CLEAR_SPACE;
                    const textBaseline = textTop - CAP_HEIGHT;

                    // Draw barcode bars
                    const values = encodeCode128A(code);
                    const totalModules = calculateTotalModules(code);
                    const moduleWidth = BARCODE_WIDTH / totalModules;

                    let x = xOffset;
                    for (let v = 0; v < values.length; v++) {
                        const pattern = CODE128_PATTERNS[values[v]];
                        let isBar = true;
                        for (let p = 0; p < pattern.length; p++) {
                            const width = parseInt(pattern[p]) * moduleWidth;
                            if (isBar) {
                                content += x.toFixed(4) + ' ' + barcodeBottom.toFixed(4) + ' ' + width.toFixed(4) + ' ' + BARCODE_HEIGHT.toFixed(4) + ' re f\n';
                            }
                            x += width;
                            isBar = !isBar;
                        }
                    }

                    // Convert text to vector paths
                    const text = '*' + code + '*';
                    const path = loadedFont.getPath(text, 0, 0, FONT_SIZE);
                    const bbox = path.getBoundingBox();
                    const textWidth = bbox.x2 - bbox.x1;
                    const textX = xOffset + (BARCODE_WIDTH / 2) - (textWidth / 2) - bbox.x1;

                    // Draw text as filled vector path
                    content += pathToPDFCommands(path, textX, textBaseline);
                    content += 'f\n';
                }

                objects.push('4 0 obj\n<< /Length ' + content.length + ' >>\nstream\n' + content + 'endstream\nendobj');

                let pdf = '%PDF-1.4\n';
                let objectOffsets = [];
                for (let i = 0; i < objects.length; i++) {
                    objectOffsets.push(pdf.length);
                    pdf += objects[i] + '\n';
                }

                const xrefOffset = pdf.length;
                pdf += 'xref\n0 ' + (objects.length + 1) + '\n0000000000 65535 f \n';
                for (let i = 0; i < objectOffsets.length; i++) {
                    pdf += objectOffsets[i].toString().padStart(10, '0') + ' 00000 n \n';
                }
                pdf += 'trailer\n<< /Size ' + (objects.length + 1) + ' /Root 1 0 R >>\nstartxref\n' + xrefOffset + '\n%%EOF';

                const blob = new Blob([pdf], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'Buffalo_Trace_Barcodes.pdf';
                link.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('PDF generation error:', e);
                alert('Error generating PDF: ' + e.message);
            }
        }

        // OCR functionality
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const ocrStatus = document.getElementById('ocrStatus');
        const previewImage = document.getElementById('previewImage');
        
        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processImage(file);
            }
        });
        
        async function processImage(file) {
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // Show processing status
            ocrStatus.className = 'ocr-status processing';
            ocrStatus.textContent = 'Processing image... This may take a moment.';
            
            try {
                const result = await Tesseract.recognize(file, 'eng', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            ocrStatus.textContent = 'Recognizing text... ' + progress + '%';
                        }
                    }
                });
                
                // Extract numbers (8-digit sequences)
                const text = result.data.text;
                const numbers = text.match(/\b\d{8}\b/g);
                
                if (numbers && numbers.length > 0) {
                    // Add to textarea
                    const textarea = document.getElementById('codes');
                    const existingText = textarea.value.trim();
                    const newNumbers = numbers.join('\n');
                    textarea.value = existingText ? existingText + '\n' + newNumbers : newNumbers;
                    
                    ocrStatus.className = 'ocr-status success';
                    ocrStatus.textContent = 'Found ' + numbers.length + ' barcode number(s): ' + numbers.join(', ');
                } else {
                    ocrStatus.className = 'ocr-status error';
                    ocrStatus.textContent = 'No 8-digit numbers found. Try a clearer image or enter numbers manually.';
                }
            } catch (error) {
                console.error('OCR error:', error);
                ocrStatus.className = 'ocr-status error';
                ocrStatus.textContent = 'Error processing image. Please try again or enter numbers manually.';
            }
        }
